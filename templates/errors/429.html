{% extends "base.html" %}

{% block title %}Too Many Requests - TravelMate{% endblock %}

{% block content %}
<div class="container" style="text-align: center; padding: 6rem 0;">
    <span style="font-size: 5rem; display: block; margin-bottom: 1rem;">🛑</span>
    <h1 style="font-size: 3rem; margin-bottom: 1rem;">Too Many Requests</h1>
    <p style="color: var(--gray-600); margin-bottom: 2rem; max-width: 500px; margin-left: auto; margin-right: auto;">
        {{ description or "You have sent too many requests in a short period. Please slow down and try again shortly." }}
    </p>
    <a href="{{ url_for('explore') }}" class="btn btn-primary">Go back Home</a>
</div>
{% endblock %}
