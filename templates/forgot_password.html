{% extends "base.html" %}

{% block title %}Forgot Password - TravelMate{% endblock %}

{% block content %}
<div class="container">
    <div class="card-auth">
        <h2>Reset Password</h2>
        <p class="card-auth-sub">Enter your email and we'll send you a link to reset your password.</p>
        
        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
            <!-- Since this is a simple form, we can just use standard HTML input and verify CSRF from session or omit CSRF checking if it's GET/POST stub, but standard action is secure -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter your registered email" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="{{ url_for('auth.login') }}" style="color: var(--primary); font-weight: 500; font-size: 0.9rem;">Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
